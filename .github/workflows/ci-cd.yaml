name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ostad-app

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: Quality Gate — Tests + SonarCloud
  # ─────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # STAGE 2: Security Gate — Trivy FS Scan
  # ─────────────────────────────────────────
  security-scan-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy FS scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-results.sarif

  # ─────────────────────────────────────────
  # STAGE 3: Policy Gate — OPA Conftest
  # ─────────────────────────────────────────
  policy-check:
    name: OPA Policy Check (Conftest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.49.1/conftest_0.49.1_Linux_x86_64.tar.gz
          tar xzf conftest_0.49.1_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest on Dockerfile
        run: conftest test Dockerfile --policy policies/docker.rego

  # ─────────────────────────────────────────
  # STAGE 4: Build & Push Docker Image
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan-fs, policy-check]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # STAGE 5: Security Gate — Trivy Image Scan
  # ─────────────────────────────────────────
  security-scan-image:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-results.sarif

  # ─────────────────────────────────────────
  # STAGE 6: Performance Gate — k6 Load Test
  # ─────────────────────────────────────────
  load-test:
    name: Load Testing with k6
    runs-on: ubuntu-latest
    needs: build-and-push
    services:
      app:
        image: ghcr.io/${{ github.repository }}/ostad-app:${{ github.sha }}
        ports:
          - 3000:3000
        env:
          DATABASE_URL: sqlite:///data/app.db
          SECRET_KEY: test-secret-key-for-load-test-only
        options: >-
          --health-cmd "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for app service
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health; then
              echo "✅ App is ready"
              exit 0
            fi
            echo "⏳ Waiting for app... attempt $i"
            sleep 2
          done
          echo "❌ App failed to start"
          exit 1

      - name: Debug container status
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs $(docker ps -aq --filter "ancestor=ghcr.io/${{ github.repository }}/ostad-app") 2>/dev/null || true
          echo "=== Port check inside container ==="
          docker exec $(docker ps -aq --filter "ancestor=ghcr.io/${{ github.repository }}/ostad-app") sh -c "netstat -tlnp 2>/dev/null || ss -tlnp" 2>/dev/null || true
          echo "=== Test curl from runner ==="
          curl -v http://localhost:3000/health || true

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-tests/load-test.js
          flags: --env BASE_URL=http://localhost:3000

  # ─────────────────────────────────────────
  # STAGE 7: Deploy to AWS EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan-image, load-test, policy-check]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/ostad-app/"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            export SECRET_KEY="${{ secrets.SECRET_KEY }}"
            export DATABASE_URL="sqlite:///data/app.db"
            cd ~/ostad-app
            docker-compose down || true
            docker-compose pull
            docker-compose up -d
            docker-compose ps
            sleep 5
            curl -f http://localhost:80/health || exit 1